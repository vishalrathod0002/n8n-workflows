<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>n8n Webhook Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: #fff;
    max-width: 420px;
    width: 100%;
    padding: 24px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover {
    background: #444;
  }
  #statusMsg {
    font-size: 13px;
    margin-top: 10px;
    min-height: 16px;
  }
  hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 16px 0;
  }
</style>
</head>
<body>

<div class="card">
  <label for="webhookUrl">Webhook URL</label>
  <input type="text" id="webhookUrl" placeholder="https://your-n8n-instance.com/webhook/xxxx" value="https://sonavi3582.app.n8n.cloud/webhook-test/webhook"/>

  <hr>

  <label for="fName">Name</label>
  <input type="text" id="fName" placeholder="Vishal" />

  <label for="lName">Last name</label>
  <input type="text" id="lName" placeholder="Rathod" />

  <label for="testField">Test</label>
  <input type="text" id="testField" placeholder="Any test value" />

  <button id="submitBtn">Send to webhook</button>

  <p id="statusMsg"></p>
</div>

<script>
document.getElementById('submitBtn').addEventListener('click', async () => {
  const url = document.getElementById('webhookUrl').value.trim();
  const name = document.getElementById('fName').value.trim();
  const lastName = document.getElementById('lName').value.trim();
  const test = document.getElementById('testField').value.trim();
  const statusEl = document.getElementById('statusMsg');

  if (!url) {
    statusEl.textContent = 'Enter a webhook URL first.';
    statusEl.style.color = 'red';
    return;
  }

  statusEl.textContent = 'Sending...';
  statusEl.style.color = '#555';

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        last_name: lastName,
        test: test
      })
    });

    if (res.ok) {
      statusEl.textContent = 'Sent to webhook.';
      statusEl.style.color = 'green';
    } else {
      statusEl.textContent = 'Webhook responded with status ' + res.status + '.';
      statusEl.style.color = 'red';
    }
  } catch (err) {
    statusEl.textContent = 'Could not reach webhook. Check the URL and CORS settings.';
    statusEl.style.color = 'red';
  }
});
</script>

</body>
</html>
